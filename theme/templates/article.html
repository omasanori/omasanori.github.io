{% extends "base.html" %}

{% block title %}{{ article.title | striptags }} | {{ SITENAME | striptags }}{% endblock title %}

{% block content %}
<header>
  <time datetime='{{ article.date.isoformat() }}'>{{ article.locale_date }}</time>
  <h2><a href='{{ SITEURL }}/{{ article.url }}' rel='Permalink to {{article.title | striptags }}'>{{ article.title }}</a></h2>
</header>
{{ article.content }}
{% endblock content %}
