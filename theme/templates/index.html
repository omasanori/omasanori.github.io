{% extends "base.html" %}

{% block content %}
{% if articles %}
<h2>Articles</h2>
<dl>
  {% for article in articles_page.object_list %}
  <dt><time datetime='{{ article.date.isoformat() }}'>{{ article.locale_date }}</time></dt>
  <dd><h3><a href='{{ SITEURL }}/{{ article.url }}' rel='bookmark'>{{ article.title }}</a></h3></dd>
  {% endfor %}
</dl>
{% endif %}
{% endblock content %}
