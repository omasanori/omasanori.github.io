{% if DEFAULT_PAGINATION %}
<ul id='pagination'>
  {% if articles_page.has_previous() %}
  <li><a href='{{ SITEURL }}/{{ articles_previous_page.url }}' rel='prev' title='Previous page'>&laquo; Prev.</a></li>
  {% endif %}
  <li>Page {{ articles_page.number }} / {{ articles_paginator.num_pages }}</li>
  {% if articles_page.has_next() %}
  <li><a href='{{ SITEURL }}/{{ articles_next_page.url }}' rel='prev' title='Next page'>Next &raquo;</a></li>
  {% endif %}
</ul>
{% endif %}
