    <p>今週は <a class="reference external" href="https://github.com/omasanori/msgpack-rust">https://github.com/omasanori/msgpack-rust</a> でMessagePack for Rustを書き始めた。基本的な型のエンコードはできるようになったので、この調子で進めていきたい。文字と文字列の扱いはまだ決めかねている。</p>
<p>来週はあまり自由に時間を使えないので、MessagePack for Rustが進展するのは再来週のことになると思う。</p>
<p>Twitterに書いても問題ない長さだけど、せっかく使おうと決めたのでこちらに書く。</p>
